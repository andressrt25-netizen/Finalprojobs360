name = "finalprojobs360"
main = "worker.js"
compatibility_date = "2026-04-28"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "finalprojobs360-db"
database_id = "REPLACE_WITH_CLOUDFLARE_D1_DATABASE_ID"
migrations_dir = "migrations"

[assets]
directory = "public"
binding = "ASSETS"
run_worker_first = ["/signup", "/jobs", "/jobs/*", "/payments/*", "/stripe/*"]
