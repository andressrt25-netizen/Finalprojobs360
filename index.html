<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ProJobs360 – Live Jobs</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
:root{
  --bg:#000; --o:#FF6A28; --w:#fff; --w3:#ccc;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--w);font-family:'DM Sans',sans-serif;}

/* HERO */
#hero{
  min-height:80vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:4rem 5%;
  position:relative;
}
#hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:url("https://images.unsplash.com/photo-1503387762-592deb58ef4e") center/cover no-repeat;
  opacity:0.12;
}
.hcontent{position:relative;z-index:2;}
h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(3rem,8vw,5rem);
}
.h1b{color:var(--o);}
.hsub{color:var(--w3);margin-top:1rem;}

/* JOBS */
#jobs{padding:4rem 5%;background:#0a0a0a;}
.jobs-container{max-width:1000px;margin:auto;text-align:center;}
.job-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:1.5rem;
  margin-top:2rem;
}
.job-card{
  background:#111;
  padding:1.5rem;
  border-radius:8px;
  border:1px solid #222;
}
.job-meta{color:var(--w3);font-size:0.9rem;}
.job-time{color:#888;font-size:0.8rem;}
.apply-btn{
  display:inline-block;
  margin-top:1rem;
  background:var(--o);
  padding:0.6rem 1.2rem;
  color:#fff;
  text-decoration:none;
}

/* FOOTER */
footer{
  text-align:center;
  padding:2rem;
  color:#777;
}
</style>
</head>

<body>

<section id="hero">
  <div class="hcontent">
    <h1>FIND WORK FASTER<br><span class="h1b">GET PAID TODAY</span></h1>
    <p class="hsub">Real jobs. Real pay. Instantly connected.</p>
  </div>
</section>

<section id="jobs">
  <div class="jobs-container">
    <h2>Available Jobs</h2>
    <div class="job-grid" id="jobGrid">
      <!-- Jobs load here -->
    </div>
  </div>
</section>

<footer>
  © 2026 ProJobs360
</footer>

<script>
const SUPABASE_URL = "https://kzzbdkdpbxnyilqbhusb.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6emJka2RwYnhueWlscWJodXNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNDM5NzYsImV4cCI6MjA5MjkxOTk3Nn0.RGupeSrrhMUXsTEUX_g7IqOjI-80u2ZF1k_J0Mzhvic";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const jobGrid = document.getElementById("jobGrid");

async function loadJobs(){
  const { data, error } = await supabase
    .from("jobs")
    .select("*")
    .order("created_at", { ascending: false });

  if(error){
    console.error("ERROR:", error);
    jobGrid.innerHTML = "<p>Failed to load jobs.</p>";
    return;
  }

  if(!data.length){
    jobGrid.innerHTML = "<p>No jobs found.</p>";
    return;
  }

  jobGrid.innerHTML = "";

  data.forEach(job => {
    const minsAgo = Math.floor((Date.now() - new Date(job.created_at)) / 60000);

    const div = document.createElement("div");
    div.className = "job-card";

    div.innerHTML = `
      <h3>${job.title}</h3>
      <p class="job-meta">${job.location} • $${job.pay}/day</p>
      <p class="job-time">Posted ${minsAgo} mins ago</p>
      <p>${job.description}</p>
      <a href="#" class="apply-btn">APPLY NOW</a>
    `;

    jobGrid.appendChild(div);
  });
}

loadJobs();
</script>

</body>
</html>
